<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Promemoria</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0ea5e9">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <link rel="stylesheet" href="/style.css">
  <script defer src="/app.js"></script>
  <!-- OneSignal SDK -->
  <script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js" async></script>
  <script defer src="/onesignal-init.js"></script>
</head>
<body>
  <header class="app-header">
    <h1>Promemoria</h1>
    <button id="installBtn" class="ghost">Installa</button>
  </header>

  <section class="controls">
    <input id="search" type="search" placeholder="Cerca…" />
    <div class="chips">
      <button data-filter="tutti" class="chip active">Tutti</button>
      <button data-filter="studio" class="chip">Studio</button>
      <button data-filter="lavoro" class="chip">Lavoro</button>
      <button data-filter="personale" class="chip">Personale</button>
    </div>
  </section>

  <main id="list" class="list"></main>

  <button id="fab" class="fab" aria-label="Aggiungi">
    <span>＋</span>
  </button>

  <!-- Dialog: nuovo promemoria -->
  <dialog id="newDialog">
    <form method="dialog" id="newForm">
      <h2>Nuovo promemoria</h2>
      <label>Titolo <input name="title" required maxlength="120" placeholder="Es. Consegna progetto" /></label>
      <label>Categoria
        <select name="category">
          <option value="studio">Studio</option>
          <option value="lavoro">Lavoro</option>
          <option value="personale" selected>Personale</option>
        </select>
      </label>
      <label>Data e ora <input type="datetime-local" name="due" required /></label>
      <menu>
        <button value="cancel" class="ghost">Annulla</button>
        <button value="submit" class="primary">Salva</button>
      </menu>
      <p class="hint">Attiva le notifiche per ricevere l’avviso all’orario scelto.</p>
      <button type="button" id="enablePush" class="secondary">Attiva notifiche</button>
    </form>
  </dialog>

  <footer class="app-footer">
    <button id="notifSettings" class="secondary">Impostazioni notifiche</button>
  </footer>
</body>
</html>
